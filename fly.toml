# fly.toml app configuration file generated for goblin-volleyball on 2026-04-01T04:34:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'goblin-volleyball'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
